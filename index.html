<!--
  RAIONA DENISE — WORK WITH ME LANDING PAGE
  Single self-contained file. Deploy anywhere (Netlify, GitHub Pages, cPanel).

  ===========================================================
  TO MAKE IMAGES SHOW: save your uploaded files into an /assets/
  folder next to this file. The image paths are already wired up in the
  "services" array and the portrait/logo references below.

  TO ADD YOUR SQUARE LINKS: scroll to the "services" array in the
  <script> at the bottom and paste each link between the quotes.
  ===========================================================
-->
<style>
  /* ---- BRAND COLORS (paste exact hex from your brand guide if these differ) ---- */
  :root{
    --cream:   #F4EBE0;  /* warm background */
    --ink:     #161616;  /* near black type */
    --pumpkin: #D9692B;  /* pumpkin spice accent, used sparingly */
    --taupe:   #E7E2D9;  /* soft card frame */
    --muted:   #8C8478;  /* quiet label grey */
    --serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
    --sans:  'DM Sans', system-ui, -apple-system, Segoe UI, sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--cream);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  img{display:block;}

  /* ============ HERO ============ */
  .hero{background:#fff;padding:34px 24px 0;overflow:hidden;position:relative;}

  /* ---- top-right CTA ---- */
  .work-btn{
    position:absolute;top:18px;right:22px;z-index:6;
    display:inline-block;background:var(--pumpkin);color:#fff;
    font-family:var(--sans);font-weight:800;font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;
    text-decoration:none;padding:12px 24px;border-radius:999px;
    box-shadow:0 6px 18px rgba(217,105,43,.32);
    transition:transform .2s ease, box-shadow .2s ease, background .2s ease;
  }
  .work-btn:hover{transform:translateY(-2px);background:#c25c23;box-shadow:0 10px 24px rgba(217,105,43,.42);}
  .work-btn:focus-visible{outline:3px solid var(--ink);outline-offset:3px;}
  .hero-stage{position:relative;max-width:1180px;margin:0 auto;min-height:740px;}

  .name-stack{text-align:center;position:relative;z-index:1;padding-top:6px;margin:0;font-weight:inherit;}
  .name-raiona{
    display:block;font-family:var(--serif);font-style:italic;font-weight:800;
    color:var(--pumpkin);font-size:clamp(3rem,9vw,7.6rem);line-height:.92;
    letter-spacing:.005em;
  }
  .name-denise{
    display:block;font-family:var(--serif);font-weight:900;color:var(--ink);
    font-size:clamp(4.6rem,20vw,13rem);line-height:.8;letter-spacing:-.01em;margin-top:-.04em;
  }

  .portrait-wrap{
    position:absolute;left:50%;bottom:0;transform:translateX(-50%);
    z-index:2;height:clamp(420px,66vh,680px);width:auto;aspect-ratio:1105/1848;max-width:92%;
    overflow:hidden;
  }
  .portrait-wrap img{height:100%;width:100%;object-fit:cover;object-position:top center;}
  .portrait-fallback{
    height:100%;aspect-ratio:1105/1848;background:var(--taupe);border-radius:18px;
    display:flex;align-items:center;justify-content:center;text-align:center;
    font-family:var(--sans);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);padding:18px;
  }

  .tag{z-index:3;}
  .tag-left{
    position:absolute;left:3%;top:43%;max-width:235px;
    font-family:var(--sans);font-weight:800;font-size:clamp(1.3rem,2.3vw,1.85rem);
    line-height:1.12;color:var(--ink);
  }
  .tag-left .accent{color:var(--pumpkin);}
  .tag-right{
    position:absolute;right:3%;top:52%;max-width:255px;text-align:left;
    font-family:var(--serif);font-weight:700;font-size:clamp(1.15rem,2vw,1.7rem);
    line-height:1.18;color:var(--ink);
  }

  /* ============ BLACK BAND ============ */
  .band{
    background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:space-between;
    gap:22px;padding:24px 6%;margin-top:-16px;position:relative;z-index:4;
  }
  .band-logo{height:56px;width:auto;flex:0 0 auto;}
  .band-logo-fallback{
    flex:0 0 auto;font-family:var(--serif);font-weight:700;color:var(--pumpkin);
    font-size:clamp(.85rem,2.4vw,1.2rem);letter-spacing:.04em;white-space:nowrap;
  }
  .band h2{
    flex:1;margin:0;text-align:center;font-family:var(--serif);font-weight:700;color:#fff;
    font-size:clamp(1.45rem,4.6vw,2.9rem);letter-spacing:.06em;
  }

  /* ============ SERVICES GRID ============ */
  .services{background:var(--cream);padding:58px 6% 30px;}
  .grid{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:26px;}
  .card{
    display:block;text-decoration:none;border-radius:16px;
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .card:hover{transform:translateY(-6px);box-shadow:0 18px 42px rgba(0,0,0,.16);}
  .card:focus-visible{outline:3px solid var(--pumpkin);outline-offset:4px;}
  .card-media{
    position:relative;aspect-ratio:4/5;background:var(--taupe);
    border-radius:16px;overflow:hidden;
  }
  .card-media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .card-fallback{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:20px;z-index:0;
  }
  .card-fallback .ff-title{font-family:var(--serif);font-weight:800;font-size:1.45rem;line-height:1.1;color:var(--ink);}
  .card-fallback .ff-note{font-family:var(--sans);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:12px;}

  /* ============ FOOTER ============ */
  .footer{background:var(--cream);text-align:center;padding:64px 6% 74px;}
  .footer .big{
    font-family:var(--serif);font-weight:900;color:var(--ink);
    font-size:clamp(2.5rem,11.5vw,7.2rem);line-height:1;letter-spacing:.02em;
  }
  .footer a{
    display:inline-block;margin-top:22px;font-family:var(--serif);color:var(--ink);
    text-decoration:none;letter-spacing:.2em;font-size:clamp(.78rem,2.5vw,1.05rem);
    transition:color .2s ease;
  }
  .footer a:hover{color:var(--pumpkin);}

  /* ============ MOBILE ============ */
  @media (max-width:820px){
    .hero{padding-bottom:0;}
    .work-btn{top:12px;right:12px;padding:9px 15px;font-size:.7rem;letter-spacing:.05em;}
    .hero-stage{min-height:auto;display:flex;flex-direction:column;align-items:center;}
    .name-stack{order:1;}
    .name-denise{font-size:clamp(3.4rem,22vw,6rem);}
    .tag{position:static;max-width:none;text-align:center;margin:18px auto 0;}
    .tag-left{order:2;}
    .tag-right{order:3;text-align:center;}
    .portrait-wrap{order:4;position:static;transform:none;height:auto;width:min(76%,360px);margin-top:14px;margin-bottom:0;}
    .portrait-wrap img{height:100%;width:100%;object-fit:cover;object-position:top center;}
    .portrait-fallback{aspect-ratio:3/5;width:100%;}
  }
  @media (max-width:900px){ .grid{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:600px){ .grid{grid-template-columns:1fr;} }
</style>
</head>
<body>

<section class="hero">
  <a class="work-btn" href="https://app.squareup.com/appointments/book/d6255409-a445-439d-9aa1-5f43c483c8bb/AYBP0YWKWP8QB/start" target="_blank" rel="noopener noreferrer">Work With Me</a>
  <div class="hero-stage">
    <h1 class="name-stack">
      <span class="name-raiona">Raiona</span>
      <span class="name-denise">Denise</span>
    </h1>

    <div class="portrait-wrap">
      <img src="assets/Raiona%20Denise%20Cropped.png" alt="Raiona Denise holding a laptop" fetchpriority="high" decoding="async"
           onerror="this.outerHTML='&lt;div class=\'portrait-fallback\'&gt;Raiona Denise&lt;/div&gt;'">
    </div>

    <div class="tag tag-left">Where Vision<br>Becomes<br><span class="accent">VISIBILITY</span></div>
    <div class="tag tag-right">Faith-based visual<br>communicator &amp;<br>visibility strategist</div>
  </div>
</section>

<div class="band">
  <img class="band-logo" alt="Raiona Denise logo">
  <h2>WAYS TO WORK WITH ME</h2>
  <img class="band-logo" alt="Raiona Denise logo">
</div>

<section class="services" aria-label="Ways to work with Raiona Denise">
  <div class="grid" id="grid"></div>
</section>

<footer class="footer">
  <div class="big">RAIONA DENISE</div>
  <a href="mailto:designer@raionadenise.com">DESIGNER@RAIONADENISE.COM</a>
</footer>

<script>
  /* =========================================================
     EDIT YOUR SQUARE / BOOKING LINKS HERE
     Paste each link between the quotes on the "url" line.
     ========================================================= */
  const services = [
    {
      title: "Graphic Design",
      image: "assets/Graphic%20Design.png",
      url:   "https://square.link/u/WwSCfgeR",
      label: "Start Your Design"
    },
    {
      title: "Brand Visibility Bundle",
      image: "assets/Brand%20Visibility.png",
      url:   "https://square.link/u/5ksO6YC2",
      label: "Book This Bundle"
    },
    {
      title: "Print Design Bundle",
      image: "assets/Print%20Bundle.png",
      url:   "https://square.link/u/iedb9jFO",
      label: "Start My Print Bundle"
    },
    {
      title: "Quick Build Landing Pages",
      image: "assets/Quick%20Build%20Landing%20Pages.png",
      url:   "https://square.link/u/Z66CvhpM",
      label: "Book With Deposit"
    },
    {
      title: "Strategy Session",
      image: "assets/Book%20Strategy.png",
      url:   "https://app.squareup.com/appointments/book/d6255409-a445-439d-9aa1-5f43c483c8bb/AYBP0YWKWP8QB/start",
      label: "Book Strategy Session"
      // Square appointment-booking link — preserved exactly, not a checkout link
    },
    {
      title: "48-Hour Church Promo Pack",
      image: "assets/48_Hour_Promo.png",
      url:   "https://square.link/u/GEkT25PB",
      label: "Book This Promo Pack"
    }
  ];

  const grid = document.getElementById("grid");

  services.forEach(function (s) {
    const a = document.createElement("a");
    a.className = "card";
    a.href = s.url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.setAttribute("aria-label", s.label);

    const media = document.createElement("div");
    media.className = "card-media";

    const fb = document.createElement("div");
    fb.className = "card-fallback";
    fb.innerHTML = '<div class="ff-title">' + s.title + '</div><div class="ff-note">' + s.label + '</div>';

    const img = document.createElement("img");
    img.src = s.image;
    img.alt = s.title + " service graphic by Raiona Denise";
    img.loading = "lazy";
    img.decoding = "async";
    img.onerror = function () { this.style.display = "none"; };

    media.appendChild(fb);
    media.appendChild(img);
    a.appendChild(media);
    grid.appendChild(a);
  });

  /* Your RD orange logo, pulled from your Drive and embedded so it travels with the file */
  const rdLogo = "assets/raiona-logo.png";
  document.querySelectorAll(".band-logo").forEach(function (el) {
    el.src = rdLogo;
    el.onerror = function () {
      this.outerHTML = '<span class="band-logo-fallback">Raiona Denise</span>';
    };
  });
</script>

</body>
</html>
